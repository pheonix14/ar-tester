<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AVIS AR | Spatial Engine v3.5</title>

<style>
    /* ==========================================================================
       AVIS CORE STYLESHEET - V3.5
       ========================================================================== */
    :root {
        --theme-bg: #050a0f;
        --neon-cyan: #00ffcc;
        --neon-gold: #ffd700;
        --neon-red: #ff3333;
        --neon-purple: #b026ff;
        --neon-blue: #0088ff;
        --neon-green: #00ff66;
        --glass: rgba(5, 10, 15, 0.85);
        --glass-border: rgba(0, 255, 204, 0.4);
    }

    * { box-sizing: border-box; }

    body, html {
        margin: 0; padding: 0; overflow: hidden; background: var(--theme-bg);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: white; user-select: none; touch-action: none;
    }

    /* ---------------- CAMERA FEED ---------------- */
    #cam {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover; z-index: 1; filter: contrast(1.1) brightness(0.85);
        transition: filter 0.3s;
    }
    
    #cam.locked { filter: contrast(1.2) brightness(0.3) grayscale(0.8); }

    /* ---------------- HUD ELEMENTS ---------------- */
    #top-hud {
        position: fixed; top: 20px; left: 20px; right: 20px; z-index: 10;
        display: flex; justify-content: space-between; align-items: flex-start;
        pointer-events: none;
    }

    .stat-pill {
        background: var(--glass); backdrop-filter: blur(12px);
        padding: 10px 20px; border-radius: 40px; border: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 12px; font-weight: 800;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        pointer-events: auto; font-size: 14px; text-transform: uppercase;
    }

    .xp-bar-container {
        position: absolute; top: 75px; left: 30px; width: 150px;
        height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
    }

    #xp-fill {
        width: 30%; height: 100%; background: var(--neon-cyan);
        box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.5s ease;
    }

    /* ---------------- LIVE LOG VIEWER ---------------- */
    #live-log-panel {
        position: fixed; top: 100px; left: 20px; width: 300px; height: 250px;
        background: rgba(0, 5, 10, 0.9); border: 1px solid var(--neon-cyan);
        border-radius: 8px; overflow-y: auto; font-family: 'Courier New', Courier, monospace;
        font-size: 11px; color: var(--neon-cyan); padding: 10px; z-index: 50;
        box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); display: flex; flex-direction: column;
        pointer-events: auto; backdrop-filter: blur(5px);
    }
    
    .log-entry { margin-bottom: 5px; border-bottom: 1px solid rgba(0,255,204,0.1); padding-bottom: 3px; word-wrap: break-word; }
    .log-warn { color: var(--neon-gold); }
    .log-error { color: var(--neon-red); }
    .log-success { color: var(--neon-green); }
    .log-data { color: var(--neon-blue); }

    /* ---------------- AR SPATIAL RENDERER ---------------- */
    #ar-world {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5; pointer-events: none; perspective: 1000px;
        transform-style: preserve-3d;
    }

    .ar-node {
        position: absolute; top: 50%; left: 50%;
        transform-style: preserve-3d; pointer-events: auto;
        display: flex; flex-direction: column; align-items: center;
        /* Hardware acceleration for smooth panning */
        will-change: transform, opacity;
        animation: fadeInNode 0.8s ease-out forwards;
    }

    /* Visual Effect: Fade in on load */
    @keyframes fadeInNode {
        0% { opacity: 0; transform: scale(0.1) translateY(50px); }
        100% { opacity: var(--target-opacity); transform: scale(var(--target-scale)) translateY(0); }
    }

    .ar-icon {
        width: 80px; height: 80px;
        background-size: contain; background-position: center; background-repeat: no-repeat;
    }

    /* Visual Effect: Glow based on Rarity */
    .ar-node.common .ar-icon { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
    .ar-node.rare .ar-icon { filter: drop-shadow(0 0 20px var(--neon-blue)); }
    .ar-node.ultra-rare .ar-icon { filter: drop-shadow(0 0 35px var(--neon-purple)); }
    .ar-node.cluster .ar-icon { filter: drop-shadow(0 0 25px var(--neon-gold)); }

    /* Visual Effect: Pulsing animation for active spawns */
    .ar-node.status-active .ar-icon {
        animation: pulse-spawn 2s infinite alternate ease-in-out;
    }

    @keyframes pulse-spawn {
        0% { transform: scale(0.95); filter: brightness(1); }
        100% { transform: scale(1.05); filter: brightness(1.3); }
    }

    .ar-label {
        background: rgba(0,0,0,0.8); border: 1px solid var(--neon-cyan);
        padding: 4px 10px; border-radius: 6px; margin-top: 8px;
        font-size: 12px; text-align: center; text-transform: uppercase;
        letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.9);
        backdrop-filter: blur(4px); transition: all 0.2s;
    }

    /* Visual Effect: Hover Tooltip */
    .ar-tooltip {
        position: absolute; top: -40px; background: var(--glass);
        border: 1px solid var(--neon-gold); padding: 5px 10px; border-radius: 4px;
        opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none;
        white-space: nowrap; font-size: 11px; color: var(--neon-gold);
        transform: translateY(10px);
    }
    .ar-node:hover .ar-tooltip, .ar-node:active .ar-tooltip { 
        opacity: 1; transform: translateY(0); 
    }
    .ar-node:hover .ar-label { border-color: var(--neon-gold); color: var(--neon-gold); }

    /* ---------------- ISOMETRIC MINIMAP ---------------- */
    #minimap-container {
        position: fixed; bottom: 130px; right: 20px; z-index: 20;
        width: 150px; height: 150px; perspective: 800px; pointer-events: none;
    }

    #minimap {
        width: 100%; height: 100%; border-radius: 50%;
        background: rgba(0, 15, 25, 0.9); border: 3px solid var(--neon-cyan);
        transform: rotateX(55deg) rotateZ(0deg);
        box-shadow: 0 20px 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,255,204,0.3);
        overflow: hidden; position: relative;
    }

    .grid-lines {
        position: absolute; width: 300%; height: 300%; top: -100%; left: -100%;
        background-image: linear-gradient(var(--neon-cyan) 1px, transparent 1px),
                          linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
        background-size: 25px 25px; opacity: 0.2;
        transition: background-position 0.2s linear;
    }

    /* PLAYER DOT & COMPASS DIRECTIONAL ARROW */
    #map-player {
        position: absolute; top: 50%; left: 50%;
        width: 14px; height: 14px; background: white;
        border: 3px solid var(--neon-cyan); border-radius: 50%;
        transform: translate(-50%, -50%); z-index: 25;
        box-shadow: 0 0 15px var(--neon-cyan);
    }

    #map-player::after {
        content: ''; position: absolute; top: -18px; left: 50%;
        transform: translateX(-50%);
        border-left: 6px solid transparent; border-right: 6px solid transparent;
        border-bottom: 14px solid var(--neon-red);
        filter: drop-shadow(0 -2px 5px var(--neon-red));
    }

    .map-blip {
        position: absolute; border-radius: 50%; z-index: 10;
        transform: translate(-50%, -50%); transition: left 0.5s linear, top 0.5s linear;
    }
    .map-blip.common { width: 6px; height: 6px; background: white; box-shadow: 0 0 5px white; }
    .map-blip.rare { width: 8px; height: 8px; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
    .map-blip.ultra-rare { width: 10px; height: 10px; background: var(--neon-purple); box-shadow: 0 0 15px var(--neon-purple); }
    .map-blip.cluster { width: 12px; height: 12px; background: var(--neon-gold); border: 2px solid white; box-shadow: 0 0 20px var(--neon-gold); }

    /* ---------------- BUTTON-ONLY OS CONTROLS ---------------- */
    #os-controls {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 30; display: flex; gap: 8px; background: var(--glass);
        padding: 10px; border-radius: 20px; border: 1px solid var(--glass-border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .os-btn {
        background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
        padding: 10px 12px; border-radius: 12px; font-weight: bold; font-size: 10px;
        text-transform: uppercase; cursor: pointer; transition: 0.2s;
        display: flex; flex-direction: column; align-items: center; gap: 5px; width: 65px;
    }

    .os-btn:active { transform: scale(0.9); background: rgba(0,255,204,0.2); }
    .os-btn.active { background: var(--neon-cyan); color: black; }
    .os-btn i { font-size: 18px; font-style: normal; }

    /* ---------------- MODALS ---------------- */
    .modal {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 85%; max-width: 400px; background: rgba(5, 10, 15, 0.98);
        border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 25px;
        z-index: 100; display: none; text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    }
    .modal.active { display: block; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes pop { from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
</style>
</head>
<body>

<div id="top-hud">
    <div class="stat-pill">
        <span style="color:var(--neon-cyan);">CELL:</span>
        <span id="grid-id">WAIT</span>
    </div>
    <div class="stat-pill">
        <span style="color:var(--neon-gold)">DATA</span>
        <span id="node-count">0</span>
    </div>
</div>

<div id="live-log-panel">
    <div style="text-align:center; border-bottom:1px solid var(--neon-cyan); padding-bottom:5px; margin-bottom:5px; font-weight:bold;">AVIS LIVE TERMINAL</div>
    <div id="log-output"></div>
</div>

<div id="ar-world"></div>

<div id="minimap-container">
    <div id="minimap">
        <div class="grid-lines" id="map-grid"></div>
        <div id="map-player"></div>
        <div id="map-markers"></div>
    </div>
</div>

<div id="os-controls">
    <button class="os-btn" onclick="SAK_Controller.forceScan()"><i>📡</i><span>SCAN</span></button>
    <button class="os-btn" id="btn-filter" onclick="SAK_Controller.cycleFilter()"><i>👁️</i><span id="lbl-filter">ALL</span></button>
    <button class="os-btn" id="btn-lock" onclick="SAK_Controller.toggleLock()"><i>🔒</i><span>LOCK</span></button>
    <button class="os-btn" id="btn-logs" onclick="SAK_Controller.toggleLogs()"><i>📋</i><span>LOGS</span></button>
    <button class="os-btn" onclick="SAK_Controller.expandClusters()"><i>💥</i><span>EXPAND</span></button>
</div>

<div id="data-modal" class="modal">
    <h2 id="data-title" style="color:var(--neon-cyan); margin-top:0;">NODE_DATA</h2>
    <div id="data-meta" style="font-size:12px; color:gray; margin-bottom:15px;"></div>
    <p id="data-content" style="color:#ddd; line-height:1.5; font-size:14px;"></p>
    <div style="background:rgba(255,215,0,0.1); padding:10px; border-radius:10px; margin:15px 0;">
        <span style="color:var(--neon-gold); font-weight:bold;">+ <span id="reward-val">0</span> XP</span>
    </div>
    <button class="os-btn" style="width:100%; margin-top:10px; background:var(--neon-cyan); color:black;" onclick="SAK_Controller.closeModal()">EXTRACT DATA</button>
</div>

<script>
/**
 * ============================================================================
 * AVIS SAK ENGINE (Spatial Augmented Kernel) v3.5
 * High-Performance, Anchored AR, Live Logging, Data Pipeline Integrated.
 * ============================================================================
 */

const CONFIG = {
    SUPABASE_URL: "https://ihdllispdbwvwcwxlvhr.supabase.co",
    SUPABASE_KEY: "sb_publishable_TbC7C4Gf277RzfQtBd3CTw_M68nRP2P",
    GRID_PRECISION: 4, // Decimals for Lat/Lon (~11m cells)
    MOVE_THRESHOLD_M: 10, // Lazy Load threshold
    CLUSTER_RADIUS_M: 25, // Clustering distance
    RENDER_RAD_M: 1000, // Max AR render distance (Distance Fog threshold)
    MINIMAP_RAD_M: 500, // Minimap scale
    MAX_RENDER_NODES: 30, // LOD System limit
    GPS_THROTTLE_MS: 2000 // Performance: Limit GPS processing
};

// Performance Caching System
const CACHE = {
    cells: new Set(),
    maxCells: 3
};

// Global State
const STATE = {
    lat: null, lon: null, heading: 0,
    lastUpdateLat: null, lastUpdateLon: null,
    lastGpsTime: 0,
    activeCell: "",
    nodes: [], // Raw pipeline nodes
    renderQueue: [], // Active LOD batch
    viewLocked: false,
    filterMode: 'ALL',
    clustersExpanded: false,
    logsVisible: true,
    gold: 0, xp: 0, lvl: 1
};

// Icons Pipeline
const ICONS = {
    landmark: 'https://cdn-icons-png.flaticon.com/512/1491/1491410.png',
    legend: 'https://cdn-icons-png.flaticon.com/512/1004/1004652.png',
    cluster: 'https://cdn-icons-png.flaticon.com/512/8205/8205367.png',
    default: 'https://cdn-icons-png.flaticon.com/512/684/684908.png'
};

// ---------------- LIVE TERMINAL LOGGER ----------------
function sysLog(msg, type = 'normal') {
    const output = document.getElementById('log-output');
    const log = document.createElement('div');
    log.className = `log-entry log-${type}`;
    log.innerHTML = `[${new Date().toISOString().substring(11,19)}] ${msg}`;
    output.prepend(log);
    
    // Memory management for logs
    if(output.children.length > 50) output.removeChild(output.lastChild);
}

// ---------------- SPATIAL MATH LIBRARY ----------------
const MathGeo = {
    dist: (lat1, lon1, lat2, lon2) => {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    },
    bearing: (lat1, lon1, lat2, lon2) => {
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
        const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    },
    getCellId: (lat, lon) => {
        return `C:${lat.toFixed(CONFIG.GRID_PRECISION)}|${lon.toFixed(CONFIG.GRID_PRECISION)}`;
    }
};

// ---------------- DATA PIPELINE ----------------
const SAK_Data = {
    fetch: async () => {
        if (!STATE.lat || !STATE.lon) return;
        
        let cellId = MathGeo.getCellId(STATE.lat, STATE.lon);
        
        // Cache / Lazy Load System
        if(CACHE.cells.has(cellId)) {
            sysLog(`[CACHE] Cell ${cellId} loaded from memory.`, 'success');
            SAK_Engine.compileScene();
            return;
        }

        sysLog(`[NET] Fetching geospatial data for area...`, 'warn');
        try {
            // Adapted Pipeline format fetching
            const res = await fetch(`/api/v1/scan?lat=${STATE.lat}&lon=${STATE.lon}&radius=${CONFIG.RENDER_RAD_M}`);
            const responseData = await res.json();
            let data = responseData.data;
            
            if (!data || data.length === 0) {
                sysLog(`[DB] No nodes. Generating predictive grid.`, 'warn');
                data = SAK_Data.generateMockGrid();
            }
            
            // Manage Cell Cache limits
            CACHE.cells.add(cellId);
            if(CACHE.cells.size > CACHE.maxCells) {
                const firstItem = CACHE.cells.values().next().value;
                CACHE.cells.delete(firstItem);
            }

            SAK_Data.process(data);
        } catch (e) {
            sysLog(`[ERR] API Offline. Booting Local Sandbox.`, 'error');
            SAK_Data.process(SAK_Data.generateMockGrid());
        }
    },

    process: (rawData) => {
        STATE.nodes = [];
        sysLog(`[DATA] Pipeline processing ${rawData.length} nodes...`, 'data');

        rawData.forEach((item, index) => {
            // Pipeline format mapping: id, name, lat, lng, type, rarity, status
            let lat = item.lat || item.latitude;
            let lon = item.lng || item.lon || item.longitude; // Prioritize lng
            if(!lat || !lon) return;

            let type = item.type || item.category || 'landmark';
            let rarity = item.rarity || (Math.random() > 0.9 ? 'ultra-rare' : (Math.random() > 0.6 ? 'rare' : 'common'));
            let status = item.status || 'active';
            
            let node = {
                id: item.id || `NODE_${index}`,
                name: item.name || "UNIDENTIFIED",
                lat: lat, lon: lon,
                type: type,
                rarity: rarity,
                status: status,
                visibilityRange: rarity === 'ultra-rare' ? 1200 : 800,
                stories: item.stories || []
            };

            // Log details of high rarity targets to viewer
            if(rarity === 'ultra-rare' || rarity === 'rare') {
                sysLog(`--> Detected [${rarity.toUpperCase()}] ${node.name} at ${lat.toFixed(4)}, ${lon.toFixed(4)}`, 'success');
            }

            STATE.nodes.push(node);
        });

        document.getElementById('node-count').innerText = STATE.nodes.length;
        sysLog(`[SYS] Indexed ${STATE.nodes.length} anchor points.`, 'success');
        SAK_Engine.compileScene();
    },

    generateMockGrid: () => {
        let mocks = [];
        if(!STATE.lat) return mocks;
        const spread = 0.003; 
        for(let i=0; i<15; i++) {
            mocks.push({
                id: "ECHO_"+i, name: "Data Fragment " + i,
                lat: STATE.lat + (Math.random() * spread * 2 - spread),
                lng: STATE.lon + (Math.random() * spread * 2 - spread),
                type: i % 4 === 0 ? 'legend' : 'landmark',
                status: i % 2 === 0 ? 'active' : 'cooldown'
            });
        }
        return mocks;
    }
};

// ---------------- SAK SPATIAL ENGINE ----------------
const SAK_Engine = {
    compileScene: () => {
        if(!STATE.lat || STATE.viewLocked) return;

        sysLog(`[ANCHOR] Player GPS: ${STATE.lat.toFixed(5)}, ${STATE.lon.toFixed(5)}`, 'data');

        let activeNodes = STATE.nodes.filter(n => {
            if(STATE.filterMode === 'LANDMARK' && n.type !== 'landmark') return false;
            if(STATE.filterMode === 'LEGEND' && n.type !== 'legend') return false;
            return true;
        });

        // 1. Distance & Bearing Calculation (Geospatial Anchoring)
        activeNodes.forEach(n => {
            n.distance = MathGeo.dist(STATE.lat, STATE.lon, n.lat, n.lon);
            n.bearing = MathGeo.bearing(STATE.lat, STATE.lon, n.lat, n.lon);
        });

        // 2. Sort & LOD System (Limit visible objects for performance)
        activeNodes.sort((a,b) => a.distance - b.distance);
        
        let lodNodes = activeNodes.slice(0, CONFIG.MAX_RENDER_NODES);

        // 3. Clustering
        if(!STATE.clustersExpanded) {
            STATE.renderQueue = SAK_Engine.cluster(lodNodes);
        } else {
            STATE.renderQueue = lodNodes;
        }

        SAK_Renderer.draw();
    },

    cluster: (nodes) => {
        let clusters = [];
        let visited = new Set();

        for(let i=0; i<nodes.length; i++) {
            if(visited.has(i)) continue;
            let current = nodes[i];
            let clusterGroup = [current];

            for(let j=i+1; j<nodes.length; j++) {
                if(visited.has(j)) continue;
                let target = nodes[j];
                if(MathGeo.dist(current.lat, current.lon, target.lat, target.lon) < CONFIG.CLUSTER_RADIUS_M) {
                    clusterGroup.push(target);
                    visited.add(j);
                }
            }

            if(clusterGroup.length > 1) {
                clusters.push({
                    isCluster: true, id: "CLUSTER_" + current.id,
                    name: `DENSITY ANOMALY (${clusterGroup.length})`,
                    lat: current.lat, lon: current.lon,
                    distance: current.distance, bearing: current.bearing,
                    type: 'cluster', rarity: 'cluster', status: 'active',
                    children: clusterGroup
                });
            } else {
                clusters.push(current);
            }
        }
        return clusters;
    }
};

// ---------------- RENDERER ----------------
const SAK_Renderer = {
    draw: () => {
        const arWorld = document.getElementById("ar-world");
        const mapMarkers = document.getElementById("map-markers");
        
        arWorld.innerHTML = "";
        mapMarkers.innerHTML = "";

        STATE.renderQueue.forEach((node) => {
            // Distance Fog / Culling
            if(node.distance > CONFIG.RENDER_RAD_M) return;

            // --- 1. BATCH RENDER MINIMAP BLIPS ---
            let radarScale = (node.distance / CONFIG.MINIMAP_RAD_M) * 70;
            if(radarScale > 70) radarScale = 70; 

            let blip = document.createElement("div");
            blip.className = `map-blip ${node.rarity}`;
            blip.style.left = `calc(50% + ${Math.sin(node.bearing * Math.PI / 180) * radarScale}px)`;
            blip.style.top = `calc(50% + ${Math.cos(node.bearing * Math.PI / 180) * -radarScale}px)`;
            mapMarkers.appendChild(blip);

            // --- 2. BATCH RENDER AR WORLD ANCHORS ---
            let relAngle = node.bearing - STATE.heading;
            if (relAngle < -180) relAngle += 360;
            if (relAngle > 180) relAngle -= 360;

            // Render if within 80 degrees of forward view
            if (Math.abs(relAngle) < 80) {
                // Inverse Distance Scaling (Near = Large, Far = Small)
                // Creates the effect of camera moving *through* the world
                let scaleFactor = Math.max(0.15, Math.min(2.5, 50 / Math.max(node.distance, 5)));
                
                // Horizontal Placement based on compass heading
                let x = (window.innerWidth / 2) + (relAngle * (window.innerWidth / 40));
                
                // Vertical Placement (Horizon line drop off)
                let y = (window.innerHeight / 2) + (node.distance * 0.2); 

                // Distance Fog Opacity
                let opacityFactor = Math.max(0.1, 1 - (node.distance / CONFIG.RENDER_RAD_M));

                let arNode = document.createElement("div");
                arNode.className = `ar-node ${node.rarity} status-${node.status}`;
                
                // Use CSS variables for the load-in animation interpolation
                arNode.style.setProperty('--target-scale', scaleFactor);
                arNode.style.setProperty('--target-opacity', opacityFactor);
                arNode.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scaleFactor})`;
                arNode.style.zIndex = Math.round(1000 - node.distance); // Closer objects render on top

                let iconUrl = ICONS[node.type] || ICONS.default;

                arNode.innerHTML = `
                    <div class="ar-tooltip">STATUS: ${node.status.toUpperCase()}</div>
                    <div class="ar-icon" style="background-image:url('${iconUrl}');"></div>
                    <div class="ar-label">[${Math.round(node.distance)}m] ${node.name}</div>
                `;

                arNode.onclick = () => SAK_Controller.openModal(node);
                arWorld.appendChild(arNode);
            }
        });
    },

    updateSensors: () => {
        if(STATE.viewLocked) return;
        
        // Minimap rotations
        document.getElementById("minimap").style.transform = `rotateX(55deg) rotateZ(${-STATE.heading}deg)`;
        document.getElementById("map-player").style.transform = `translate(-50%, -50%) rotateZ(${STATE.heading}deg)`;

        // Grid Translation (Walking feeling)
        if(STATE.lat && STATE.lon) {
            const grid = document.getElementById("map-grid");
            // Multiplier ensures physical steps translate visually
            grid.style.backgroundPosition = `${-STATE.lon * 200000}px ${STATE.lat * 200000}px`;
        }
    }
};

// ---------------- HARDWARE SENSORS ----------------
async function bootHardware() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById("cam").srcObject = stream;

        navigator.geolocation.watchPosition(
            (pos) => {
                let now = Date.now();
                // GPS Throttling for Performance
                if (now - STATE.lastGpsTime < CONFIG.GPS_THROTTLE_MS) return;
                STATE.lastGpsTime = now;

                STATE.lat = pos.coords.latitude;
                STATE.lon = pos.coords.longitude;
                
                let newCell = MathGeo.getCellId(STATE.lat, STATE.lon);
                if(newCell !== STATE.activeCell) {
                    STATE.activeCell = newCell;
                    document.getElementById('grid-id').innerText = newCell;
                }

                if(!STATE.lastUpdateLat) {
                    STATE.lastUpdateLat = STATE.lat;
                    STATE.lastUpdateLon = STATE.lon;
                    SAK_Data.fetch();
                } else {
                    let moveDist = MathGeo.dist(STATE.lastUpdateLat, STATE.lastUpdateLon, STATE.lat, STATE.lon);
                    if(moveDist > CONFIG.MOVE_THRESHOLD_M) {
                        STATE.lastUpdateLat = STATE.lat;
                        STATE.lastUpdateLon = STATE.lon;
                        sysLog(`[MOVE] Threshold crossed (${Math.round(moveDist)}m). Syncing zone...`, 'warn');
                        SAK_Data.fetch(); 
                    } else {
                        SAK_Engine.compileScene();
                    }
                }
            },
            (err) => { sysLog("[ERR] GPS SIGNAL LOST.", "error"); },
            { enableHighAccuracy: true, maximumAge: 0 }
        );

        if ('ondeviceorientationabsolute' in window) {
            window.addEventListener("deviceorientationabsolute", handleOrientation);
        } else if ('ondeviceorientation' in window) {
            window.addEventListener("deviceorientation", handleOrientation);
        }

        // Render Loop
        setInterval(() => {
            SAK_Renderer.updateSensors();
            SAK_Renderer.draw(); 
        }, 30); // ~30fps is stable for DOM-based AR

    } catch(e) {
        sysLog("[ERR] HARDWARE DENIED. INJECTING DEV COORDS.", "error");
        STATE.lat = 23.5204; STATE.lon = 87.3119; STATE.heading = 0;
        document.getElementById('grid-id').innerText = MathGeo.getCellId(STATE.lat, STATE.lon);
        SAK_Data.fetch();
        setInterval(() => { SAK_Renderer.updateSensors(); SAK_Renderer.draw(); }, 30);
    }
}

function handleOrientation(e) {
    if(e.webkitCompassHeading) {
        STATE.heading = e.webkitCompassHeading;
    } else if (e.absolute || e.alpha !== null) {
        STATE.heading = 360 - e.alpha;
    }
}

// ---------------- UI CONTROLLER (BUTTON ONLY) ----------------
const SAK_Controller = {
    forceScan: () => {
        sysLog("[CMD] MANUAL SCAN EXECUTED", 'warn');
        SAK_Data.fetch();
    },

    cycleFilter: () => {
        const modes = ['ALL', 'LANDMARK', 'LEGEND'];
        let idx = modes.indexOf(STATE.filterMode);
        STATE.filterMode = modes[(idx + 1) % modes.length];
        
        const btn = document.getElementById('btn-filter');
        document.getElementById('lbl-filter').innerText = STATE.filterMode;
        btn.classList.add('active');
        setTimeout(() => btn.classList.remove('active'), 200);
        
        sysLog(`[CMD] FILTER: ${STATE.filterMode}`, 'success');
        SAK_Engine.compileScene();
    },

    toggleLock: () => {
        STATE.viewLocked = !STATE.viewLocked;
        const btn = document.getElementById('btn-lock');
        const cam = document.getElementById('cam');
        if(STATE.viewLocked) {
            btn.classList.add('active');
            cam.classList.add('locked');
            sysLog("[CMD] GYRO SENSORS LOCKED.", "warn");
        } else {
            btn.classList.remove('active');
            cam.classList.remove('locked');
            sysLog("[CMD] GYRO SENSORS UNLOCKED.", "success");
            SAK_Engine.compileScene(); 
        }
    },

    toggleLogs: () => {
        STATE.logsVisible = !STATE.logsVisible;
        const panel = document.getElementById('live-log-panel');
        const btn = document.getElementById('btn-logs');
        if(STATE.logsVisible) {
            panel.style.display = 'flex';
            btn.classList.add('active');
        } else {
            panel.style.display = 'none';
            btn.classList.remove('active');
        }
    },

    expandClusters: () => {
        STATE.clustersExpanded = !STATE.clustersExpanded;
        sysLog(STATE.clustersExpanded ? "[CMD] CLUSTERS EXPANDED" : "[CMD] CLUSTERS COLLAPSED");
        SAK_Engine.compileScene();
    },

    openModal: (node) => {
        if(node.isCluster) {
            SAK_Controller.expandClusters();
            return;
        }

        const modal = document.getElementById("data-modal");
        document.getElementById("data-title").innerText = node.name;
        
        let meta = `ID: ${node.id} | TYPE: ${node.type.toUpperCase()}<br>GEO: ${node.lat.toFixed(5)}, ${node.lon.toFixed(5)}<br>DIST: ${Math.round(node.distance)}m | RARITY: ${node.rarity}`;
        document.getElementById("data-meta").innerHTML = meta;

        let lore = node.stories && node.stories.length > 0 ? node.stories[0].content : "No local data streams found at this coordinate.";
        document.getElementById("data-content").innerText = lore;
        
        let reward = node.reward || 50;
        document.getElementById("reward-val").innerText = reward;
        STATE.lastReward = reward;

        modal.classList.add("active");
    },

    closeModal: () => {
        STATE.xp += STATE.lastReward;
        if (STATE.xp >= 100) { STATE.lvl++; STATE.xp = 0; sysLog(`[SYS] LEVEL UP! You are now Level ${STATE.lvl}`, 'success'); }
        
        document.getElementById("lvl-tag").innerText = "LVL " + STATE.lvl;
        document.getElementById("xp-fill").style.width = STATE.xp + "%";
        document.getElementById("data-modal").classList.remove("active");
    }
};

// Auto-Boot Sequence
window.onload = () => {
    bootHardware();
};
</script>
